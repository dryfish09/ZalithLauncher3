name: 功能建议 (中文)
description: 为项目提出一个想法
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 您的功能请求是否与某个问题相关？请描述。
      placeholder: 当...时我总是不满意
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述您希望的解决方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述您考虑过的替代方案。
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 额外信息
      description: 添加其他上下文或截图。
    validations:
      required: false
