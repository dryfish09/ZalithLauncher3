name: Android 14 smoke test

on:
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: android-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install NDK & SDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;25.2.9519653" \
            "platforms;android-35" \
            "platform-tools" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64" 2>&1 | tail -5

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

      - name: Build APK (arm64 + x86_64)
        run: |
          ./gradlew :ZalithLauncher:assembleDebug \
            -Parch=all \
            -Plauncher_app_name="ZalithLauncher" \
            -Plauncher_name="ZalithLauncher" \
            -Plauncher_short_name="Zalith" \
            -Purl_home="https://github.com/Star1xr/ZalithLauncher2Plus" \
            -Plauncher_version_code=1 \
            -Plauncher_version_name="test" \
            -Pdefault_store_password="android" \
            -Pdefault_key_password="android" \
            -Poauth_client_id="" \
            --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: ZalithLauncher/build/outputs/apk/debug/*.apk

      - name: Enable KVM
        run: |
          sudo apt-get -qq install cpu-checker
          kvm-ok
          sudo usermod -aG kvm $USER
          sudo chmod 666 /dev/kvm

      - name: Create & boot AVD (API 34)
        run: |
          avdmanager create avd -n testDevice \
            -k "system-images;android-34;google_apis;x86_64" \
            -d "pixel_6" --force
          $ANDROID_HOME/emulator/emulator -avd testDevice \
            -no-window -no-audio -gpu swiftshader_indirect \
            -memory 2048 -no-snapshot -wipe-data &
          adb wait-for-device
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          while [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" != "1" ]; do
            sleep 5
          done

      - name: Install APK & launch
        run: |
          APK=$(ls ZalithLauncher/build/outputs/apk/debug/*.apk | head -1)
          adb install "$APK"
          adb shell am start \
            -n com.movtery.zalithlauncher.v2.debug/.ui.activities.SplashActivity

      - name: Verify app survives 20s
        run: |
          sleep 20
          PID=$(adb shell pidof com.movtery.zalithlauncher.v2.debug || true)
          if [ -z "$PID" ]; then
            echo "App CRASHED. Last 80 logcat lines:"
            adb logcat -d -b crash -v brief 2>/dev/null | tail -80
            exit 1
          fi
          echo "PID $PID — app running on API 34"

      - name: Screenshot
        if: always()
        run: adb exec-out screencap -p > screenshot.png

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshot
          path: screenshot.png

      - name: Dump logcat on failure
        if: failure()
        run: adb logcat -d -v brief > logcat.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: logcat
          path: logcat.txt
