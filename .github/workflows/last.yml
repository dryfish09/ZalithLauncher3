name: Release

on:
  workflow_dispatch:

# Otomatik GITHUB_TOKEN'a release oluşturma yetkisi veriyoruz
permissions:
  contents: write

jobs:
  Build:
    uses: ./.github/workflows/build.yml
    with:
      variant: Release
    secrets: inherit

  Release:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          # ÇÖZÜM: archive:false ile gelen dağınık dosyaları sorunsuz indirir
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          files: |
            ./release-artifacts/*.apk
            ./release-artifacts/*aarch*
          prerelease: true
          generate_release_notes: true
          generate_release_notes: true
          files: |
            ./release-artifacts/*.apk
            ./release-artifacts/*aarch*
          prerelease: true
          generate_release_notes: true
          prerelease: true
          generate_release_notes: true
